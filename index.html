  <style>
    :root {
      --bg: #0d0d0d;
      --text: #ffffff;
      --cyan: #16a8d2;
      --cyan-2: #39d7ff;
      --max: 1160px;
      --ease: cubic-bezier(.2,.8,.2,1);
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      background: var(--bg);
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      height: 100vh;
      height: 100dvh;
      color: var(--text);
      background:
        radial-gradient(circle at 50% -15%, rgba(22,168,210,.18), transparent 42rem),
        radial-gradient(circle at 88% 20%, rgba(22,168,210,.08), transparent 30rem),
        linear-gradient(180deg, #0d0d0d 0%, #101010 48%, #0d0d0d 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      letter-spacing: -.02em;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: .36;
      background-image:
        linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: radial-gradient(circle at 50% 22%, black 0%, transparent 68%);
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    a { -webkit-tap-highlight-color: transparent; }

    :focus-visible {
      outline: 2px solid var(--cyan-2);
      outline-offset: 4px;
      border-radius: 999px;
    }

    .site {
      position: relative;
      z-index: 2;
      isolation: isolate;
      height: 100%;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      overflow: hidden;
    }

    main {
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
    }

    .container {
      width: min(calc(100% - 40px), var(--max));
      margin-inline: auto;
    }

    .hero {
      min-height: 0;
      display: grid;
      align-items: center;
      padding: clamp(24px, 5vh, 56px) 0 clamp(12px, 2.5vh, 28px);
      position: relative;
      overflow: hidden;
    }

    .hero__grid {
      display: grid;
      grid-template-columns: minmax(0, 1.06fr) minmax(320px, .94fr);
      align-items: center;
      gap: clamp(36px, 6vw, 96px);
    }

    h1, p { margin: 0; }

    h1 {
      margin-top: 0;
      max-width: 820px;
      font-size: clamp(2.7rem, 6.4vw, 5.6rem);
      line-height: .94;
      letter-spacing: -.065em;
      text-wrap: balance;
      font-weight: 880;
    }

    .accent {
      color: var(--cyan-2);
      text-shadow: 0 0 36px rgba(22,168,210,.34);
    }

    .hero__actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 36px;
    }

    .btn {
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 14px 18px;
      font-weight: 800;
      letter-spacing: -.01em;
      transition: transform .22s var(--ease), background .22s var(--ease), box-shadow .22s var(--ease);
    }

    .btn:hover { transform: translateY(-2px); }

    .btn--primary {
      color: #041116;
      background: linear-gradient(180deg, #fff, #dff8ff);
      box-shadow: 0 0 0 1px rgba(255,255,255,.32), 0 22px 58px rgba(22,168,210,.18);
    }

    .btn--primary:hover {
      background: linear-gradient(180deg, var(--cyan-2), var(--cyan));
      box-shadow: 0 0 0 1px rgba(57,215,255,.38), 0 24px 72px rgba(22,168,210,.28);
    }

    .radar {
      position: relative;
      min-height: 520px;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .radar__canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: .82;
    }

    .orb {
      width: min(88vw, 470px);
      aspect-ratio: 1;
      border-radius: 50%;
      position: relative;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 50%, rgba(22,168,210,.18) 0 2px, transparent 3px),
        radial-gradient(circle, rgba(22,168,210,.1), transparent 58%);
      border: 1px solid rgba(22,168,210,.18);
      box-shadow:
        inset 0 0 72px rgba(22,168,210,.09),
        0 0 110px rgba(22,168,210,.13);
      overflow: hidden;
    }

    .orb::before,
    .orb::after {
      content: "";
      position: absolute;
      inset: 11%;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.11);
      box-shadow: 0 0 0 72px rgba(255,255,255,.018), 0 0 0 144px rgba(255,255,255,.012);
    }

    .orb::after {
      inset: 0;
      background: conic-gradient(from 0deg, transparent 0 64%, rgba(22,168,210,.34) 72%, transparent 82% 100%);
      border: 0;
      mask: radial-gradient(circle, transparent 0 18%, black 19% 70%, transparent 71%);
      animation: rotate 9s linear infinite;
      opacity: .76;
    }

    .orb__core {
      position: relative;
      z-index: 1;
      width: 116px;
      height: 116px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #fff, var(--cyan-2) 24%, rgba(22,168,210,.3) 48%, rgba(0,0,0,.18) 70%);
      box-shadow: 0 0 44px rgba(22,168,210,.42), 0 0 96px rgba(22,168,210,.14);
    }

    .orb__axis {
      position: absolute;
      inset: 50% 7% auto;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(22,168,210,.56), transparent);
    }

    .orb__axis:nth-child(3) { transform: rotate(90deg); }
    .orb__axis:nth-child(4) { transform: rotate(35deg); opacity: .55; }
    .orb__axis:nth-child(5) { transform: rotate(-35deg); opacity: .55; }

    .social {
      padding: 0 0 clamp(10px, 2vh, 22px);
      text-align: center;
      background: transparent;
    }

    .social__links {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .social-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.55);
      font-size: 1.25rem;
      transition: border-color .22s var(--ease), color .22s var(--ease), background .22s var(--ease);
    }

    .social-btn svg {
      width: 1em;
      height: 1em;
      fill: currentColor;
    }

    .social-btn:hover {
      border-color: rgba(22,168,210,.5);
      color: var(--cyan-2);
      background: rgba(22,168,210,.07);
    }

    .footer {
      padding: clamp(10px, 1.8vh, 18px) 0;
      border-top: 0;
      background: transparent;
      color: rgba(255,255,255,.42);
      font-size: .86rem;
    }

    .footer__inner {
      display: flex;
      justify-content: center;
      text-align: center;
    }

    @keyframes rotate { to { transform: rotate(360deg); } }

    @media (max-width: 980px) {
      .hero__grid { grid-template-columns: 1fr; }
      .hero { padding-top: clamp(20px, 4vh, 42px); }
      .radar { min-height: 0; height: min(36dvh, 320px); margin-top: 4px; }
      .orb { width: min(62vw, 310px); }
    }

    @media (max-width: 680px) {
      .container { width: min(calc(100% - 28px), var(--max)); }
      .hero { padding: clamp(14px, 3vh, 28px) 0 8px; }
      .hero__grid { gap: clamp(24px, 4vh, 34px); }
      h1 { margin-top: 0; font-size: clamp(2.15rem, 10.4vw, 3.25rem); }
      .hero__actions { width: 100%; }
      .hero__actions { margin-top: 18px; }
      .hero__actions .btn { flex: 1 1 0; width: auto; }
      .btn { min-height: 44px; padding: 11px 16px; }
      .radar { height: min(31dvh, 250px); }
      .orb { width: min(64vw, 250px); }
      .orb__core { width: 66px; height: 66px; }
      .social { padding-bottom: 8px; }
      .social-btn { width: 44px; height: 44px; font-size: 1.08rem; }
      .footer { padding: 9px 0; font-size: .78rem; }
    }

    @media (max-width: 680px) and (max-height: 700px) {
      .hero { padding-top: 10px; }
      h1 { margin-top: 0; font-size: clamp(1.95rem, 9.4vw, 2.6rem); }
      .hero__actions { margin-top: 12px; }
      .btn { min-height: 40px; padding: 9px 14px; }
      .radar { height: min(27dvh, 180px); }
      .orb { width: min(52vw, 180px); }
      .orb__core { width: 52px; height: 52px; }
      .social-btn { width: 40px; height: 40px; }
      .footer { padding: 7px 0; }
    }

    @media (min-width: 981px) and (max-height: 650px) {
      .hero { padding: 12px 0 6px; }
      h1 { margin-top: 0; font-size: clamp(2.75rem, 5.2vw, 4.3rem); }
      .hero__actions { margin-top: 16px; }
      .btn { min-height: 42px; padding: 10px 16px; }
      .radar { min-height: 0; height: min(74dvh, 420px); }
      .orb { width: min(34vw, 400px); }
      .social { padding-bottom: 6px; }
      .social-btn { width: 42px; height: 42px; font-size: 1.05rem; }
      .footer { padding: 7px 0; font-size: .78rem; }
    }

    @media (min-width: 681px) and (max-width: 980px) and (max-height: 700px) {
      .hero__grid { grid-template-columns: minmax(0, 1.06fr) minmax(260px, .94fr); }
      .hero { padding: 12px 0 6px; }
      h1 { margin-top: 0; font-size: clamp(2.4rem, 5.8vw, 3.4rem); }
      .hero__actions { margin-top: 14px; }
      .btn { min-height: 40px; padding: 9px 14px; }
      .radar { height: min(68dvh, 360px); }
      .orb { width: min(34vw, 300px); }
      .social { padding-bottom: 6px; }
      .social-btn { width: 40px; height: 40px; }
      .footer { padding: 7px 0; }
    }

    @media (orientation: landscape) and (max-height: 500px) {
      .hero { padding: 6px 0 3px; }
      .hero__grid {
        grid-template-columns: minmax(0, 1.08fr) minmax(180px, .92fr);
        gap: clamp(18px, 4vw, 44px);
      }
      h1 { margin-top: 0; font-size: clamp(1.75rem, 5vw, 2.65rem); }
      .hero__actions { width: auto; margin-top: 9px; }
      .btn { width: auto; min-height: 34px; padding: 7px 12px; font-size: .84rem; }
      .radar { min-height: 0; height: min(62dvh, 220px); margin-top: 0; }
      .orb { width: min(29vw, 210px); }
      .orb__core { width: 48px; height: 48px; }
      .social { padding-bottom: 3px; }
      .social-btn { width: 34px; height: 34px; font-size: .9rem; }
      .footer { padding: 4px 0; font-size: .7rem; }
    }

    @media (max-width: 680px) and (orientation: portrait) {
      .hero {
        isolation: isolate;
        overflow: visible;
      }

      .hero__grid {
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: clamp(12px, 2.2vh, 22px);
        height: 100%;
      }

      .hero__content {
        position: relative;
        order: 2;
        z-index: 2;
        width: 100%;
        padding-top: 0;
      }

      .radar {
        position: relative;
        order: 1;
        z-index: 0;
        right: auto;
        bottom: auto;
        width: min(78vw, 32dvh, 310px);
        height: min(78vw, 32dvh, 310px);
        margin: 0 auto;
        opacity: .96;
      }

      .orb {
        width: 100%;
        max-width: none;
      }

      .orb__core {
        width: clamp(86px, 24vw, 112px);
        height: clamp(86px, 24vw, 112px);
      }

      .social,
      .footer {
        position: relative;
        z-index: 2;
        background: transparent;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .001ms !important;
      }
      .radar__canvas { display: none; }
    }
  </style>
</head>
<body>
  <div class="site">

  <script>
    (() => {
      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      const canvas = document.querySelector('.radar__canvas');
      if (!canvas || reduceMotion) return;
      const context = canvas.getContext('2d');
      if (!context) return;

      let width = 0;
      let height = 0;
      let ratio = 1;
      let particles = [];
      const particleCount = 64;

      const glow = document.createElement('canvas');
      glow.width = 64;
      glow.height = 64;
      const glowContext = glow.getContext('2d');
      const gradient = glowContext.createRadialGradient(32, 32, 0, 32, 32, 32);
      gradient.addColorStop(0, 'rgba(57, 215, 255, 1)');
      gradient.addColorStop(.14, 'rgba(57, 215, 255, .9)');
      gradient.addColorStop(.3, 'rgba(22, 168, 210, .28)');
      gradient.addColorStop(1, 'rgba(22, 168, 210, 0)');
      glowContext.fillStyle = gradient;
      glowContext.fillRect(0, 0, 64, 64);

      const resize = () => {
        const rect = canvas.getBoundingClientRect();
        ratio = Math.min(window.devicePixelRatio || 1, 2);
        width = Math.max(1, rect.width);
        height = Math.max(1, rect.height);
        canvas.width = Math.floor(width * ratio);
        canvas.height = Math.floor(height * ratio);
        context.setTransform(ratio, 0, 0, ratio, 0, 0);
        particles = Array.from({ length: particleCount }, (_, index) => {
          const angle = (Math.PI * 2 * index) / particleCount + Math.random() * .28;
          const orbit = Math.min(width, height) * (.18 + Math.random() * .36);
          return {
            angle,
            orbit,
            speed: .00008 + Math.random() * .00016,
            size: 1 + Math.random() * 1.8,
            alpha: .24 + Math.random() * .46
          };
        });
      };

      let rafId = 0;
      let running = false;
      let last = 0;

      const draw = (now) => {
        const delta = Math.min(48, now - last);
        last = now;
        context.clearRect(0, 0, width, height);
        const cx = width / 2;
        const cy = height / 2;

        context.save();
        context.globalCompositeOperation = 'lighter';
        particles.forEach((particle) => {
          particle.angle += delta * particle.speed;
          const wobble = Math.sin(now * .0006 + particle.orbit) * 9;
          const x = cx + Math.cos(particle.angle) * (particle.orbit + wobble);
          const y = cy + Math.sin(particle.angle) * (particle.orbit * .72 + wobble);
          const radius = particle.size * 3 + 6;
          context.globalAlpha = particle.alpha;
          context.drawImage(glow, x - radius, y - radius, radius * 2, radius * 2);
        });
        context.restore();

        if (running) rafId = requestAnimationFrame(draw);
      };

      const start = () => {
        if (running) return;
        running = true;
        last = performance.now();
        rafId = requestAnimationFrame(draw);
      };

      const stop = () => {
        running = false;
        cancelAnimationFrame(rafId);
      };

      resize();
      window.addEventListener('resize', resize, { passive: true });

      if ('IntersectionObserver' in window) {
        new IntersectionObserver((entries) => {
          if (entries[0].isIntersecting) start();
          else stop();
        }).observe(canvas);
      } else {
        start();
      }
    })();
  </script>
